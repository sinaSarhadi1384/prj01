<!doctype html>.1.
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سامانه استعلام قیمت | نی نی بیت</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <header>
      <div class="logo">
        <h1>نی نی بیت</h1>
        <span>سامانه استعلام قیمت</span>
      </div>
    </header>

    <main>
      <div class="login-card">
        <h2>ورود به سامانه</h2>

        <p>
          برای مشاهده لیست کالاها و قیمت‌های روز، کد دسترسی خود را وارد کنید.
        </p>

        <form id="loginForm">
          <input type="password" id="accessCode" placeholder="کد دسترسی" />

          <button type="submit">ورود</button>
        </form>

        <div class="features">
          <div class="feature">
            <span>✓</span>
            قیمت روز
          </div>

          <div class="feature">
            <span>✓</span>
            موجودی لحظه‌ای
          </div>

          <div class="feature">
            <span>✓</span>
            دسترسی ویژه همکاران
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div>نی نی بیت</div>

      <div>سامانه استعلام قیمت کالا</div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
